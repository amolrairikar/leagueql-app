name: fantasy-football-recap-build-pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:

  deploy:
    # TODO: change this step name to dynamically append env
    name: Deploy Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: >-
            ${{ github.event_name == 'pull_request' 
              && format('arn:aws:iam::{0}:role/github-actions-dev-role', secrets.AWS_ACCOUNT_ID) 
              || format('arn:aws:iam::{0}:role/github-actions-prod-role', secrets.AWS_ACCOUNT_ID) }}
          aws-region: us-east-1
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity
